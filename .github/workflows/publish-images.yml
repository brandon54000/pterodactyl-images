name: Publish Pterodactyl images

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.bot
          push: true
          tags: ghcr.io/brandon54000/pterodactyl-images:meeting-bot-node22-python-ffmpeg

      - name: Build and push ollama image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ollama
          push: true
          tags: ghcr.io/brandon54000/pterodactyl-images:ollama-pterodactyl
